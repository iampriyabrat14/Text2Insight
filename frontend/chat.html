<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQL-to-NLP — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/chat.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="app">

  <!-- ── Sidebar ──────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">💬</div>
      <span class="sidebar-logo-text">SQL-to-NLP</span>
    </div>

    <button class="btn-new-chat" id="new-chat-btn" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Chat
    </button>

    <p class="sidebar-section-title">Chats</p>
    <div class="session-list" id="session-list"></div>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Loading…</div>
          <div class="user-tier" id="user-tier"></div>
        </div>
        <button class="btn-logout" id="logout-btn" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ── Main chat area ─────────────────────────────────────────────── -->
  <main class="chat-main">

    <!-- Animated waterflow background -->
    <div class="bg-flow" aria-hidden="true">
      <div class="bg-blob bg-blob--1"></div>
      <div class="bg-blob bg-blob--2"></div>
      <div class="bg-blob bg-blob--3"></div>
      <div class="bg-blob bg-blob--4"></div>
      <div class="bg-blob bg-blob--5"></div>
    </div>

    <!-- Header -->
    <header class="chat-header">
      <span class="chat-header-title" id="chat-title">New Chat</span>
      <div class="chat-header-right">
        <div class="quota-wrap" title="Monthly token usage">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <div class="quota-bar">
            <div class="quota-fill" id="quota-fill" style="width:0%"></div>
          </div>
          <span class="quota-label" id="quota-label">— tokens</span>
        </div>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Input area -->
    <div class="chat-input-area">
      <div id="csv-badge-area" style="display:flex;align-items:center;gap:8px;padding:0 4px 6px;max-width:840px;margin:0 auto;"></div>
      <div class="chat-input-row">
        <input type="file" id="csv-file-input" accept=".csv" style="display:none">
        <button class="upload-btn" id="upload-csv-btn" title="Upload CSV to ask questions about your data">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </button>
        <textarea
          class="chat-textarea"
          id="chat-input"
          placeholder="Ask a question about your sales data…"
          rows="1"
          maxlength="1000"
        ></textarea>
        <button class="btn-send" id="send-btn" type="button" title="Send (Enter)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Press <kbd style="font-family:inherit;font-size:.7rem;padding:1px 5px;border:1px solid var(--border);border-radius:3px">Enter</kbd> to send · <kbd style="font-family:inherit;font-size:.7rem;padding:1px 5px;border:1px solid var(--border);border-radius:3px">Shift+Enter</kbd> for newline</p>
    </div>

  </main>
</div>

<div id="toast-container"></div>

<script type="module">
  import { requireAuth, logout, getUser } from './js/auth.js';
  import { initChat } from './js/chat.js';
  import { startQuotaPolling, fetchAndUpdateQuota } from './js/quota.js';
  import { get } from './js/api.js';

  // Guard — redirect if not logged in
  if (!requireAuth()) throw new Error('redirect');

  // ── Populate user info ───────────────────────────────────────────────
  async function loadUser() {
    try {
      const res = await get('/auth/me');
      if (!res.ok) return;
      const data = await res.json();

      document.getElementById('user-name').textContent  = data.username;
      document.getElementById('user-tier').textContent  = data.tier;
      document.getElementById('user-avatar').textContent =
        data.username.slice(0, 1).toUpperCase();

      // Tier badge colour
      const tierColours = {
        free:  '#64748b', basic: '#0284c7',
        pro:   '#7c3aed', admin: '#dc2626',
      };
      document.getElementById('user-avatar').style.background =
        tierColours[data.tier] || '#3b82f6';

      // Update quota bar from /me response
      if (data.quota) {
        const { updateQuotaBar } = await import('./js/quota.js');
        updateQuotaBar(data.quota);
      }
    } catch { /* silent */ }
  }

  // ── Logout ───────────────────────────────────────────────────────────
  document.getElementById('logout-btn').addEventListener('click', logout);

  // ── Boot ─────────────────────────────────────────────────────────────
  loadUser();
  startQuotaPolling(30_000);
  initChat();
</script>

</body>
</html>
